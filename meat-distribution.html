<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meat Distribution - Ramadan 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        #reader { width: 100%; max-width: 500px; margin: 0 auto; border-radius: 1rem; overflow: hidden; }
        .priority-badge { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-red-50 to-stone-100 min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-6xl">
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6 border-l-8 border-red-700">
            <div class="flex items-center justify-between mb-4">
                <button onclick="location.href='index.html'" class="flex items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 px-4 rounded-lg transition">
                    <i class="fas fa-home"></i> Dashboard
                </button>
                <h1 class="text-2xl md:text-3xl font-bold text-red-900 text-center flex-1">
                    <i class="fas fa-cow mr-2"></i>Meat Distribution
                </h1>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white rounded-xl shadow-md p-6 text-center">
                    <h2 class="text-xl font-bold mb-4 text-gray-800">Scan Member QR</h2>
                    <div id="reader" class="hidden mb-4 border-4 border-dashed border-gray-200"></div>
                    <div class="flex flex-col gap-4">
                        <button id="startScanBtn" class="w-full bg-red-700 hover:bg-red-800 text-white font-bold py-4 rounded-xl transition shadow-lg text-lg">
                            <i class="fas fa-camera mr-2"></i>Start Scanning
                        </button>
                        <div class="relative">
                            <input type="text" id="membershipInput" class="w-full px-4 py-4 border-2 border-gray-200 rounded-xl focus:border-red-500 outline-none text-lg font-mono uppercase" placeholder="Enter Member ID Manually">
                            <button id="manualSubmitBtn" class="absolute right-2 top-2 bottom-2 bg-gray-800 text-white px-6 rounded-lg hover:bg-black transition">
                                Issue
                            </button>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-md overflow-hidden">
                    <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                        <h3 class="font-bold text-gray-700 uppercase text-sm tracking-wider">Today's Distribution Logs</h3>
                        <button id="exportBtn" class="bg-green-600 text-white px-4 py-1 rounded text-sm hover:bg-green-700">
                            <i class="fas fa-file-excel mr-1"></i> Excel
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-stone-50 text-stone-500 text-xs uppercase">
                                <tr>
                                    <th class="px-6 py-4">Member ID</th>
                                    <th class="px-6 py-4 text-center">Parcels</th>
                                    <th class="px-6 py-4 text-right">Time</th>
                                </tr>
                            </thead>
                            <tbody id="meatLogs" class="divide-y"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-amber-50 rounded-xl shadow-md p-6 border border-amber-200">
                    <h3 class="text-amber-800 font-bold mb-2 flex items-center uppercase text-sm">
                        <i class="fas fa-star mr-2 priority-badge text-amber-500"></i> 2-Parcel Eligibility
                    </h3>
                    <p class="text-[11px] text-amber-700 mb-4 italic leading-tight">These members contributed and should receive TWO parcels of meat.</p>
                    <ul id="priorityListDisplay" class="space-y-2 max-h-96 overflow-y-auto pr-2 custom-scrollbar"></ul>
                    <div class="mt-6 pt-4 border-t border-amber-200">
                        <button id="resetMeatBtn" class="w-full bg-white border border-red-200 text-red-600 py-2 rounded-lg text-sm font-bold hover:bg-red-50 transition">
                            <i class="fas fa-trash-alt mr-2"></i>Clear This Page Data
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="beepSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>

    <script>
        // --- CONFIGURATION ---
        const priorityMembers = ["PR/016/1/O/G", "PR/025/2/X/A", "PR/102/1/B/Z"];
        let meatRecords = JSON.parse(localStorage.getItem('meatRecords') || '[]');
        let html5QrCode = null;

        function init() {
            renderPriorityList();
            updateUI();
        }

        function renderPriorityList() {
            const list = document.getElementById('priorityListDisplay');
            list.innerHTML = priorityMembers.map(id => `
                <li class="bg-white p-2 rounded border border-amber-200 text-sm font-mono flex justify-between items-center shadow-sm">
                    <span class="font-bold text-amber-900">${id}</span>
                    <span class="bg-amber-500 text-white text-[10px] px-2 py-0.5 rounded-full font-black italic">2X PARCEL</span>
                </li>
            `).join('');
        }

        function updateUI() {
            const tbody = document.getElementById('meatLogs');
            if (meatRecords.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="p-12 text-center text-gray-400 italic">No distribution records found.</td></tr>`;
                return;
            }
            tbody.innerHTML = meatRecords.map(r => `
                <tr class="hover:bg-red-50 transition">
                    <td class="px-6 py-4 font-mono font-bold text-red-900 text-sm">${r.id}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="${r.count > 1 ? 'bg-amber-500 text-white shadow-sm' : 'bg-gray-200 text-gray-700'} px-3 py-1 rounded-full text-[11px] font-black uppercase">
                            ${r.count} Parcel(s)
                        </span>
                    </td>
                    <td class="px-6 py-4 text-right text-[11px] text-gray-500 font-semibold">${new Date(r.time).toLocaleTimeString()}</td>
                </tr>
            `).join('');
        }

        function playSuccessSignal() {
            document.getElementById('beepSound').play().catch(e => console.log('Audio disabled by browser'));
            if (navigator.vibrate) navigator.vibrate(200);
        }

        function processDistribution(id) {
            id = id.toUpperCase().trim();
            if (!id) return;

            // Stop/Pause scanner immediately to prevent double-read
            if (html5QrCode && html5QrCode.getState() === 2) {
                html5QrCode.pause();
            }

            const resumeScanner = () => {
                if (html5QrCode && html5QrCode.getState() === 3) { // 3 = Paused
                    html5QrCode.resume();
                }
            };

            // Check if already received
            if (meatRecords.some(r => r.id === id)) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Already Collected',
                    text: `Member ${id} has already received meat today.`,
                    confirmButtonColor: '#b91c1c'
                }).then(resumeScanner);
                return;
            }

            playSuccessSignal();

            const isPriority = priorityMembers.includes(id);
            const defaultCount = isPriority ? 2 : 1;

            Swal.fire({
                title: isPriority ? '⭐ Priority Member' : 'Standard Member',
                html: `<div class="p-2">
                        <p class="text-sm text-gray-600 mb-4">Recording distribution for <b>${id}</b></p>
                        <p class="font-bold text-red-700 mb-2">Number of Meat Parcels:</p>
                       </div>`,
                input: 'number',
                inputValue: defaultCount,
                showCancelButton: true,
                confirmButtonColor: '#b91c1c',
                cancelButtonColor: '#6b7280',
                inputAttributes: { min: 1, max: 10, step: 1 }
            }).then((result) => {
                if (result.isConfirmed) {
                    meatRecords.unshift({ 
                        id: id, 
                        count: parseInt(result.value) || 1, 
                        time: new Date().toISOString() 
                    });
                    localStorage.setItem('meatRecords', JSON.stringify(meatRecords));
                    updateUI();
                    
                    Swal.fire({ icon: 'success', title: 'Recorded!', timer: 1000, showConfirmButton: false })
                        .then(resumeScanner);
                    
                    document.getElementById('membershipInput').value = '';
                } else {
                    resumeScanner();
                }
            });
        }

        // --- SCANNER CONTROLS ---
        document.getElementById('startScanBtn').addEventListener('click', function() {
            const readerDiv = document.getElementById('reader');
            
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            if (readerDiv.classList.contains('hidden')) {
                readerDiv.classList.remove('hidden');
                this.innerHTML = '<i class="fas fa-times mr-2"></i>Stop Scanner';
                this.classList.replace('bg-red-700', 'bg-gray-800');

                html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 15, qrbox: { width: 250, height: 250 } },
                    (decodedText) => {
                        processDistribution(decodedText);
                    },
                    (error) => { /* ignore constant scanning noise */ }
                ).catch(err => {
                    Swal.fire('Camera Error', 'Permission denied', 'error');
                    readerDiv.classList.add('hidden');
                });
            } else {
                html5QrCode.stop().then(() => {
                    readerDiv.classList.add('hidden');
                    this.innerHTML = '<i class="fas fa-camera mr-2"></i>Start Scanning';
                    this.classList.replace('bg-gray-800', 'bg-red-700');
                });
            }
        });

        document.getElementById('manualSubmitBtn').addEventListener('click', () => {
            processDistribution(document.getElementById('membershipInput').value);
        });

        document.getElementById('resetMeatBtn').addEventListener('click', () => {
            Swal.fire({
                title: 'Clear Records?',
                text: "Are you sure you want to reset all meat distribution data?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'Yes, Clear All'
            }).then((res) => {
                if(res.isConfirmed) {
                    meatRecords = [];
                    localStorage.removeItem('meatRecords');
                    updateUI();
                    Swal.fire('Deleted!', 'Memory has been cleared.', 'success');
                }
            });
        });

        document.getElementById('exportBtn').addEventListener('click', () => {
            if(meatRecords.length === 0) return Swal.fire('No Data', 'Nothing to export', 'info');
            const ws = XLSX.utils.json_to_sheet(meatRecords);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "MeatDistribution");
            XLSX.writeFile(wb, `Meat_Distribution_${new Date().toISOString().split('T')[0]}.xlsx`);
        });

        init();
    </script>
</body>
</html>
